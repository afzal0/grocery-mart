spring:
  application:
    name: grocery-mart-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/grocery_mart}   # native Postgres 17 (Docker VM corrupted; see decision R20)
    username: ${POSTGRES_USER:grocery}
    password: ${POSTGRES_PASSWORD:grocery}
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

grocerymart:
  pricing:
    delivery-base: 3.00        # flat component of the distance-based delivery fee
    delivery-per-km: 1.20      # added per km between store and delivery address (PostGIS)
    gst-rate: 0.10             # AU GST, tax-INCLUSIVE (component of grand total, not added on top)
    max-service-km: 25         # addresses beyond this from the store are out of delivery range
  delivery:
    location-retention-hours: 24    # driver GPS fixes purged this long after a delivery completes
    slot-ready-lead-minutes: 60     # a scheduled order enters the dispatch queue this early
  notifications:
    push-max-attempts: 5            # bounded FCM retry before an outbox event is marked failed
    token-retention-days: 60        # device tokens unseen this long are expired by the hygiene sweep
  retention:
    audit-days: 365                 # audit_log rows kept this long (longer than operational data)
  ratelimit:
    requests-per-minute: 300        # per-principal/IP sliding-window cap (429 over the limit)
  payments:
    stripe-webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dev_grocery_mart_secret}
    reservation-ttl-minutes: 15   # card auth holds stock this long before the sweeper releases it

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true        # /actuator/health/liveness + /readiness (Story 9.14)
      group:
        readiness:
          include: readinessState,db   # readiness fails if the DB is unavailable -> taken out of rotation
        liveness:
          include: livenessState
  health:
    redis:
      enabled: false        # Redis not run natively yet (added back with Docker/native Redis later)
