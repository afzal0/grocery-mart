# Story 9.12 — secret-scanning gate. Blocks merge if any secret pattern is found in the diff or
# full history. Uses the repo .gitleaks.toml allowlist for known dev placeholders / fixtures.
name: security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaked-then-removed secrets are still caught
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_ENABLE_COMMENTS / org license var configured at org level
